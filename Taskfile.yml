version: '3'

vars:
  BINARY_NAME: overwatch
  DOCKER_IMAGE: constellation-overwatch:latest

tasks:
  build:
    desc: Build the binary
    cmds:
      - echo "Building {{.BINARY_NAME}}..."
      - go build -o bin/{{.BINARY_NAME}} ./cmd/microlith

  run:
    desc: Run the binary
    deps: [build]
    cmds:
      - echo "Running {{.BINARY_NAME}}..."
      - ./bin/{{.BINARY_NAME}}

  docker-build:
    desc: Build Docker image
    cmds:
      - echo "Building Docker image..."
      - docker build -t {{.DOCKER_IMAGE}} .

  docker-run:
    desc: Start services with Docker Compose
    cmds:
      - echo "Starting services with Docker Compose..."
      - docker-compose up -d

  docker-stop:
    desc: Stop Docker Compose services
    cmds:
      - echo "Stopping services..."
      - docker-compose down

  clean:
    desc: Clean up build artifacts and data
    cmds:
      - echo "Cleaning up..."
      - rm -rf bin/
      - rm -rf data/
      - rm -rf logs/

  generate-certs:
    desc: Generate self-signed certificates for development
    cmds:
      - echo "Generating self-signed certificates for development..."
      - mkdir -p certs
      - openssl req -x509 -newkey rsa:4096 -keyout certs/server.key -out certs/server.crt -days 365 -nodes -subj "/CN=localhost"
      - chmod 644 certs/server.crt
      - chmod 600 certs/server.key
      - echo "Certificates generated in ./certs/"

  templ-generate:
    desc: Generate templ files
    cmds:
      - echo "Generating templ files..."
      - go run github.com/a-h/templ/cmd/templ@latest generate

  templ-watch:
    desc: Start templ file watcher
    cmds:
      - echo "Starting templ file watcher..."
      - go run github.com/a-h/templ/cmd/templ@latest generate --watch --proxy="http://localhost:8080" --open-browser=false

  dev:
    desc: Start development mode with templ generation and server
    deps: [templ-generate]
    cmds:
      - |
        set -e
        echo "Starting development mode with templ generation and server..."
        echo "Press Ctrl+C to stop all services"
        echo ""

        # PIDs storage
        TEMPL_PID=""
        SERVER_PID=""

        # Cleanup function
        cleanup() {
          local exit_code=$?
          echo ""
          echo "Shutting down services..."

          # Send SIGTERM to child processes
          if [ -n "$TEMPL_PID" ]; then
            echo "Stopping templ watcher (PID: $TEMPL_PID)..."
            kill -TERM $TEMPL_PID 2>/dev/null || true
          fi

          if [ -n "$SERVER_PID" ]; then
            echo "Stopping server (PID: $SERVER_PID)..."
            # Server has graceful shutdown built-in for NATS
            kill -TERM $SERVER_PID 2>/dev/null || true
          fi

          # Wait for processes to terminate gracefully
          sleep 1

          # Force cleanup any stragglers
          pkill -f "templ.*generate.*watch" 2>/dev/null || true
          pkill -f "bin/overwatch" 2>/dev/null || true

          # Additional NATS cleanup if needed
          pkill -f "nats-server" 2>/dev/null || true

          echo "All services stopped"
          exit $exit_code
        }

        # Trap signals for cleanup
        trap cleanup INT TERM EXIT

        # Start templ watcher in background
        go run github.com/a-h/templ/cmd/templ@latest generate --watch --proxy="http://localhost:8080" --open-browser=false &
        TEMPL_PID=$!
        echo "Started templ watcher (PID: $TEMPL_PID)"

        # Give templ time to initialize
        sleep 2

        # Build and start server in background
        go build -o bin/{{.BINARY_NAME}} ./cmd/microlith
        ./bin/{{.BINARY_NAME}} &
        SERVER_PID=$!
        echo "Started server (PID: $SERVER_PID)"
        echo ""
        echo "Development mode running. Watching for changes..."
        echo ""

        # Wait for any process to exit
        wait -n

        # If we get here, one process died, so cleanup
        exit 1

  default:
    desc: Show available tasks
    cmds:
      - task --list
