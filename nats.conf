# Monitoring
monitoring {
  http_port: 8223
  https_port: 8224
}

# Limits
limits {
  max_connections: 2000
  max_subscriptions: 0  # Unlimited
  max_payload: 2MB
  max_pending: 128MB
  max_control_line: 4KB

  # Write deadline
  write_deadline: "5s"
}

# Ping settings
ping_interval: "2m"
ping_max: 3

# Write deadline
write_deadline: "5s"