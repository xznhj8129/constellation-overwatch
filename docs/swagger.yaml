basePath: /api/v1
definitions:
  github_com_Constellation-Overwatch_constellation-overwatch_pkg_ontology.CreateEntityRequest:
    properties:
      entity_type:
        type: string
      metadata:
        additionalProperties: true
        type: object
      name:
        type: string
      position:
        $ref: '#/definitions/github_com_Constellation-Overwatch_constellation-overwatch_pkg_ontology.Position'
      priority:
        enum:
        - low
        - normal
        - high
        - critical
        type: string
      status:
        enum:
        - active
        - inactive
        - unknown
        type: string
    required:
    - entity_type
    type: object
  github_com_Constellation-Overwatch_constellation-overwatch_pkg_ontology.CreateOrganizationRequest:
    properties:
      description:
        maxLength: 500
        type: string
      metadata:
        additionalProperties: true
        type: object
      name:
        maxLength: 255
        minLength: 1
        type: string
      org_type:
        enum:
        - company
        - agency
        - individual
        type: string
    required:
    - name
    - org_type
    type: object
  github_com_Constellation-Overwatch_constellation-overwatch_pkg_ontology.Entity:
    properties:
      altitude:
        type: number
      components:
        type: string
      created_at:
        type: string
      entity_id:
        type: string
      entity_type:
        type: string
      heading:
        type: number
      is_live:
        type: boolean
      latitude:
        type: number
      longitude:
        type: number
      metadata:
        type: string
      name:
        type: string
      org_id:
        type: string
      priority:
        type: string
      status:
        type: string
      tags:
        type: string
      updated_at:
        type: string
      velocity:
        type: number
    type: object
  github_com_Constellation-Overwatch_constellation-overwatch_pkg_ontology.Organization:
    properties:
      created_at:
        type: string
      description:
        type: string
      metadata:
        type: string
      name:
        type: string
      org_id:
        type: string
      org_type:
        type: string
      updated_at:
        type: string
    type: object
  github_com_Constellation-Overwatch_constellation-overwatch_pkg_ontology.Position:
    properties:
      altitude:
        type: number
      latitude:
        maximum: 90
        minimum: -90
        type: number
      longitude:
        maximum: 180
        minimum: -180
        type: number
    required:
    - latitude
    - longitude
    type: object
host: localhost:8080
info:
  contact:
    email: support@constellation-overwatch.com
    name: Constellation Overwatch Support
    url: https://github.com/Constellation-Overwatch/constellation-overwatch/issues
  description: C4ISR (Command, Control, Communications, and Intelligence) server mesh
    for drone/robotic communication
  license:
    name: MIT
    url: https://github.com/Constellation-Overwatch/constellation-overwatch/blob/main/LICENSE
  termsOfService: https://github.com/Constellation-Overwatch/constellation-overwatch
  title: Constellation Overwatch API
  version: "1.0"
paths:
  /entities:
    delete:
      consumes:
      - application/json
      description: Delete an entity by ID
      parameters:
      - description: Organization ID
        in: query
        name: org_id
        required: true
        type: string
      - description: Entity ID
        in: query
        name: entity_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Delete entity
      tags:
      - Entities
    get:
      consumes:
      - application/json
      description: Get a list of entities for an organization
      parameters:
      - description: Organization ID
        in: query
        name: org_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_Constellation-Overwatch_constellation-overwatch_pkg_ontology.Entity'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List entities
      tags:
      - Entities
    post:
      consumes:
      - application/json
      description: Create a new entity within an organization
      parameters:
      - description: Organization ID
        in: query
        name: org_id
        required: true
        type: string
      - description: Entity data
        in: body
        name: entity
        required: true
        schema:
          $ref: '#/definitions/github_com_Constellation-Overwatch_constellation-overwatch_pkg_ontology.CreateEntityRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_Constellation-Overwatch_constellation-overwatch_pkg_ontology.Entity'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create entity
      tags:
      - Entities
    put:
      consumes:
      - application/json
      description: Update an existing entity
      parameters:
      - description: Organization ID
        in: query
        name: org_id
        required: true
        type: string
      - description: Entity ID
        in: query
        name: entity_id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: updates
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_Constellation-Overwatch_constellation-overwatch_pkg_ontology.Entity'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Update entity
      tags:
      - Entities
  /health:
    get:
      consumes:
      - application/json
      description: Get the health status of the API and its dependencies
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties: true
            type: object
      summary: Health check
      tags:
      - Health
  /organizations:
    delete:
      consumes:
      - application/json
      description: Delete an organization by ID
      parameters:
      - description: Organization ID
        in: query
        name: org_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Delete organization
      tags:
      - Organizations
    get:
      consumes:
      - application/json
      description: Get a list of all organizations
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_Constellation-Overwatch_constellation-overwatch_pkg_ontology.Organization'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List organizations
      tags:
      - Organizations
    post:
      consumes:
      - application/json
      description: Create a new organization
      parameters:
      - description: Organization data
        in: body
        name: organization
        required: true
        schema:
          $ref: '#/definitions/github_com_Constellation-Overwatch_constellation-overwatch_pkg_ontology.CreateOrganizationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_Constellation-Overwatch_constellation-overwatch_pkg_ontology.Organization'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create organization
      tags:
      - Organizations
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    description: 'Enter the token with the `Bearer: ` prefix, e.g. "Bearer abcde12345"'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
