services:
  constellation-overwatch:
    build: .
    image: constellation-overwatch:latest
    container_name: constellation-overwatch
    restart: unless-stopped
    ports:
      - "4222:4222"
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      # Uncomment if using custom certs
      # - ./certs:/app/certs:ro
    environment:
      - NATS_HOST=0.0.0.0
      - NATS_PORT=4222
      # Security Configuration
      - NATS_AUTH_ENABLED=true
      - NATS_USER=constellation
      - NATS_PASSWORD=changeme_dev_only
      - NATS_SYS_USER=sys
      - NATS_SYS_PASSWORD=changeme_sys_dev_only
      # TLS Configuration (Enable for production)
      - NATS_TLS_ENABLED=false
      # - NATS_TLS_CERT=/app/certs/server.crt
      # - NATS_TLS_KEY=/app/certs/server.key
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
